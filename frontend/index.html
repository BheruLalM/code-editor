<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CodeArena</title>
  </head>
  <body class="bg-darkBg text-white antialiased">
    <div id="root">
      <div style="min-height:100vh;display:flex;align-items:center;justify-content:center;background:#0F1629;color:white;font-family:system-ui,sans-serif">
        <div style="text-align:center">
          <div style="width:32px;height:32px;border:4px solid #2563EB;border-top-color:transparent;border-radius:50%;animation:ca-spin 1s linear infinite;margin:0 auto 16px"></div>

        </div>
      </div>
    </div>
    <style>@keyframes ca-spin{to{transform:rotate(360deg)}}</style>
    <script type="module" src="/src/main.jsx"></script>
  </body>
